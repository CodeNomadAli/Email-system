name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            cd ~/htdocs/flashxmail.com

            git reset --hard
            git pull origin main

            npm install --legacy-peer-deps
            npm run build

            pm2 restart flashxmail || pm2 start npm --name "flashxmail" -- start
            pm2 restart email-system || pm2 start npm --name "email-system" -- start
