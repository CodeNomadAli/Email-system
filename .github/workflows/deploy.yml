name: Auto Deploy FlashXMail + Email System

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # Step 3: Install dependencies & build locally
      - name: Install & Build
        run: |
          npm install --legacy-peer-deps
          npm run build

      # Step 4: Deploy to Server via SSH
      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            cd ~/htdocs/flashxmail.com

            # 🔹 Export DATABASE_URL for Prisma
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"

            # Pull latest code
            git reset --hard
            git pull origin main

            # Install dependencies & build
            npm install --legacy-peer-deps
            npm run build

            # Restart both apps with PM2
            pm2 restart flashxmail || pm2 start npm --name "flashxmail" -- start
            pm2 restart email-system || pm2 start npm --name "email-system" -- start
